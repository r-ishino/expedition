services:
  mysql:
    image: mysql:8.0
    ports:
      - "33336:3306"
    environment:
      MYSQL_ROOT_PASSWORD: expedition
      MYSQL_DATABASE: expedition
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3334:3333"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
