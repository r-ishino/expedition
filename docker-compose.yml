services:
  mysql:
    image: mysql:8.0
    ports:
      - '33336:3306'
    environment:
      MYSQL_ROOT_PASSWORD: expedition
      MYSQL_DATABASE: expedition
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
